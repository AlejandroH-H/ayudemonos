# Blueprint de Render para el Sistema de Reportes Sismo.
# La base de datos es Neon (externa), no se define aquí.
# Las variables con sync:false se rellenan en el panel de Render (no en el repo).
services:
  - type: web
    name: reportes-sismo
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      # En Render la red permite TCP 5432: usar el driver pg estándar (más
      # estable con el almacén de sesión que el WebSocket serverless de Neon).
      - key: DB_DRIVER
        value: pg
      # Secreto de sesión generado por Render (login del admin)
      - key: SESSION_SECRET
        generateValue: true
      # ── Secretas: rellénalas en el panel de Render ──
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Pon aquí https://<nombre>.onrender.com tras el primer deploy
      - key: APP_URL
        sync: false
